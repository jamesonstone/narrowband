name: narrowband-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static Narrowband site
        run: |
          test -f public/index.html
          test -f public/assets/styles.css
          test -f public/.nojekyll
          test "$(cat public/CNAME)" = "narrowband.jamesonstone.io"
          grep -q "https://jamesonstone.io/" public/index.html
          grep -q "2026-06-29" public/index.html
          grep -q "github.com/jamesonstone/narrowband" public/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
